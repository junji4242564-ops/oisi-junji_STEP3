<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale =1">
    <title>TNG CAFE</title>
    <link rel="stylesheet" href="test.css">
  </head>

  <body>
    
    <header>
      <section>
        <h1>TNG CAFE</h1>
        <p>心安らぐ一杯をあなたに</p>
      </section>

      <nav>
        <ul>
          <li><a href="#aboutus"><strong>About Us</strong></a></li>
          <li><a href="#menu"><strong>Menu</strong></a></li>
          <li><a href="#contact"><strong>Contact</strong></a></li>
        </ul>
      </nav>
    </header>
    
    <main>
      <section id="aboutus">
        <h2 >About Us</h2>
        <div class="shop-image">
          TNGCafeは自然の香りに包まれたリラックス空間を提供しています。<br>
          自家焙煎コーヒーと手作りスイーツで、穏やかな時間をお過ごしください。
          <img src="image/tbgcafe.jpg">
        </div>
      </section>

      <section id="menu">
        <h2>Menu</h2>
          
        <div class="menu-card">

          <div class="menus">
            <img src="image/coffee.jpg" alt="コーヒー">
            <p>ブレンドコーヒー</p>
          </div>

          <div class="menus">
            <img src="image/bake.jpg" alt="ケーキ">
            <p>ベイクドチーズケーキ</p>
          </div>

          <div class="menus">
            <img src="image/latte.jpg" alt="ラテ">
            <p>カフェラテ</p>
          </div>

        </div>

      </section>

      <section id="contact">
        <h2>Contact</h2>

        <form action="#" method="post">
          <div class="form-group">
            <label for="name">お名前：</label>
            <input type="text" id="name" name="name">
          </div>

          <div class="form-group">
            <label for="email">メールアドレス：</label>
            <input type="email" id="email" name="email">
          </div>

          <div class="form-group">
            <label for="message">お問い合わせ内容：</label>
            <textarea id="message" name="message"></textarea>
          </div>
          
          <button type="submit">送信</button>
        </form>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 TNG Cafe</p>
    </footer>
  </body>
</html>
